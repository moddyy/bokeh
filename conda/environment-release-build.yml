name: bk-release-build
channels:
  - conda-forge
dependencies:
  - python=3.11

  # build
  - boto3
  - colorama
  - conda-build 24*    # pre .conda format
  - conda-verify 3.4*
  - libiconv
  - nodejs 24.*
  - python-build
  - setuptools
  - yaml

  # docs
  - cartopy
  - colorcet
  - firefox >=96
  - geckodriver
  - icalendar
  - ipython
  - networkx
  - pygments
  - pygraphviz
  - pyshp
  - scikit-learn
  - scipy
  - squarify
  - sympy
  - toml

  # pip dependencies
  - pip
  - pip:
    # docs
    - bokeh_sampledata
    - pydata_sphinx_theme
    - sphinx ==9.*
    - sphinx-copybutton
    - sphinx-design
    - sphinx-favicon
    - sphinxext-opengraph >= 0.11.0
